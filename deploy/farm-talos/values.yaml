# Per-deployment overrides for the multica Helm chart.
# Source chart: /Users/cjs/dev/multica/packaging/helm/multica/

hostname: multica.chrissnell.com
image:
  registry: registry.chrissnell.com/multica
  pullSecret: registry-credentials
  pullPolicy: IfNotPresent
  tag: v0.4.0-mk25
  tags:
    # PG 17 + pgvector v0.7.4 have been unchanged from mk3 through the current
    # top-level — pure rebuilds — so pin postgres at mk3 to avoid bouncing the
    # stateful pod just to repull the same bits.
    postgres: v0.4.0-mk3
  # CI populates these per-image digests on every release; the runtimeClaude
  # entry below is the migration seed (carried over from the per-workspace
  # runtimeImage hard-pin that was removed in favor of this canonical field).
  # Humans don't edit these — image-release.yml owns the file.
  digests:
    runtimeClaude: "sha256:e5e5426c820cae4fc6ed4acfc5c5e4e91bb476df21f46dea1e88e35ab5ae0b28"
    backend: sha256:bd38ab7c1fe66efc84c50c8ec8d58b59cbe151cd03d7f34a3f4110804740df3b
    web: sha256:83ef0e462c340b3ac1ff3661bf8817b3b9f4608030d466cca48ba738284217ba
    controller: sha256:3480fed02866f8eb8ef0245e2df9aa48df73ecb64610600dd0343d629ee3f1ff
    claudeBroker: sha256:4f56cdf0ceb8b2acb5d465ecd654c4efc280e325f508a1037e7de5671bc784bc
    repocache: sha256:b47556f3a244f05f37544cf0fa73d911725ea79eed4222e2a04a7078715356b1
# Public exposure is handled OUT of this chart: a standalone
# cloudflare-tunnel Ingress (multica-cf-ingress.yaml) puts multica behind the
# shared Cloudflare Tunnel, gated by a Cloudflare Access One-Time PIN policy.
# All chart-managed ingresses (the nginx public ingress and the .local LAN
# ingress) are disabled so the OTP-protected tunnel hostname is the only door.
ingress:
  enabled: false
platform:
  enabled: true
  backend:
    replicaCount: 1
    appEnv: production
    allowSignup: true
    publicUrl: https://multica.chrissnell.com
    # Log into multica once, stay logged in (~10 years). Cloudflare Access OTP
    # is the real gate in front; this just avoids a second login each visit.
    authTokenTtl: "87600h"
    uploads:
      size: 10Gi
      storageClass: synology-nfs-csi
  web:
    replicaCount: 1
  postgres:
    enabled: true
    size: 20Gi
    storageClass: synology-nfs-csi
runtime:
  enabled: true
  mode: controller
  serverUrl: http://multica-backend.multica.svc:8080
  tokenSecretName: multica-token
  gitSshSecretName: multica-git-ssh
  # Cluster-wide GitHub PAT injected into every worker Job pod as GH_TOKEN
  # so the `gh` CLI baked into the runtime image works out of the box.
  # Secret is created out-of-band; the chart only references it by name.
  githubTokenSecretName: multica-github-token
  # Two K8s-mode agents on the same workspace: one with cluster-admin via the
  # built-in k8s-admin worker profile, one with no cluster API access. The
  # daemon_id is hashed from (prefix, workspaceID, provider, agentName), so
  # keeping these names exact preserves the existing agent_runtime rows.
  workspaceId: ""
  workspaces:
    - id: "1d8f9b53-fbd4-4904-b388-7257e3f8eb55" # Graywolf
      provider: claude
      agentName: "Claude (with K8S Homelab Access)"
      workerProfile: k8s-admin
      # Runtime image resolved via the chart's image.digests.runtimeClaude
      # field — the release workflow updates that canonical pin so all
      # workspaces get the same vetted digest.
    - id: "1d8f9b53-fbd4-4904-b388-7257e3f8eb55" # Graywolf
      provider: claude
      agentName: "Claude (No K8S Homelab Access)"
  controller:
    replicaCount: 1
    image:
      name: multica-controller # tag inherits from image.tag
    workdir:
      # Tried archlinux-nfs (NFSv4.1) — turned out 9x SLOWER (191s vs
      # 20s for a graywolf checkout). Backed by slower disks on that
      # server, the protocol version improvement couldn't overcome it.
      # For meaningful speedup we'd need true node-local storage,
      # which on Talos requires either a user-volume in the machine
      # config or a CSI like Longhorn — its own project.
      storageClass: synology-nfs-csi
      size: 5Gi
  # In-cluster OAuth token broker — single source of truth for the Anthropic
  # refresh_token. Workers get the access_token via secretKeyRef from the
  # broker-mirrored Secret (no refresh_token in worker pods at all).
  claudeBroker:
    enabled: true
    image:
      name: multica-claude-broker
  # In-cluster repo cache (Plan F.1). Maintains bare clones of every
  # workspace repo on an RWX PVC. Worker Job pods mount the PVC RO and clone
  # via file:// URLs rewritten through a per-task gitconfig CM. Sub-second
  # per-task clones; decouples workers from origin during a job.
  repocache:
    enabled: true
    image:
      name: multica-repocache
    # 5 min keeps workspace repos fresh enough for the agent while being
    # polite to GitHub: 12 fetches/hour/repo instead of 60. Also aligns
    # with the broker's refreshPad so any rate-coupled drift is gentle.
    fetchInterval: 5m
    storage:
      storageClass: synology-nfs-csi # NFS CSI driver supports RWX natively
      accessMode: ReadWriteMany
      size: 20Gi
  daemon:
    replicaCount: 1
    deviceName: multica-cluster
    maxConcurrentTasks: 2
    image:
      name: multica-runtime-claude
    agent:
      provider: claude
      auth: oauth
      oauthSecretName: multica-claude-oauth
    git:
      authorName: "Chris Snell"
      authorEmail: "1072626+chrissnell@users.noreply.github.com"
      signing:
        enabled: true
bootstrap:
  enabled: false
