name: image-release
on:
  workflow_dispatch:
    inputs:
      rebuild_postgres:
        description: "Rebuild postgres image (rare, stateful)"
        type: boolean
        default: false

concurrency:
  group: image-release
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: multica-arc-runners
    timeout-minutes: 30
    env:
      HARBOR_HOST: registry.chrissnell.com
      BUILDKIT_ADDR: tcp://buildkitd.multica-ci.svc:1234
    steps:
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Check out main at HEAD
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0   # need full history for tag math

      - name: Guard runtime-watched paths
        run: make check-runtime-paths

      - name: Resolve last release tag
        id: last
        run: |
          LAST_TAG=$(git describe --tags --match 'v*-mk*' --abbrev=0)
          echo "tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Decide whether runtime needs rebuild
        id: runtime
        run: |
          WATCHED=$(packaging/scripts/check-runtime-paths.sh)
          if git diff --name-only "${{ steps.last.outputs.tag }}..HEAD" -- $WATCHED | grep -q .; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump packaging/image-tag
        id: bump
        run: |
          packaging/scripts/bump-image-tag.sh
          NEW_TAG=$(cat packaging/image-tag)
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push platform images (parallel)
        run: |
          set -euo pipefail
          BUILDCTL="buildctl --addr ${BUILDKIT_ADDR}"
          # Per-image Dockerfile path. backend/web Dockerfiles live at repo
          # root; the rest under packaging/docker/<name>/Dockerfile.
          declare -A DOCKERFILE=(
            [backend]="Dockerfile"
            [web]="Dockerfile.web"
            [controller]="packaging/docker/controller/Dockerfile"
            [claude-broker]="packaging/docker/claude-broker/Dockerfile"
            [repocache]="packaging/docker/repocache/Dockerfile"
            [postgres]="packaging/docker/postgres/Dockerfile"
          )
          IMAGES=(backend web controller claude-broker repocache)
          if [ "${{ steps.runtime.outputs.rebuild }}" = "true" ]; then
            IMAGES+=(runtime)
          fi
          if [ "${{ inputs.rebuild_postgres }}" = "true" ]; then
            IMAGES+=(postgres)
          fi
          mkdir -p /tmp/digests
          for img in "${IMAGES[@]}"; do
            (
              if [ "$img" = "runtime" ]; then
                # Runtime is two stages (base + claude); reuse build-images.sh
                # which handles the chained build and toolchain ARGs.
                REGISTRY="${HARBOR_HOST}/multica" \
                TAG="${{ steps.bump.outputs.tag }}" \
                packaging/scripts/build-images.sh runtime
              else
                $BUILDCTL build \
                  --frontend dockerfile.v0 \
                  --local context=. \
                  --local dockerfile="$(dirname "${DOCKERFILE[$img]}")" \
                  --opt filename="$(basename "${DOCKERFILE[$img]}")" \
                  --output type=image,name=${HARBOR_HOST}/multica/multica-${img}:${{ steps.bump.outputs.tag }},push=true \
                  --metadata-file /tmp/digests/${img}.json
              fi
            ) &
          done
          wait

      - name: Pin digests into deploy/farm-talos/values.yaml
        run: |
          set -euo pipefail
          for img in backend web controller claude-broker repocache postgres; do
            f=/tmp/digests/${img}.json
            [ -f "$f" ] || continue
            digest=$(jq -r '."containerimage.digest"' "$f")
            # Map the build target name to the values.yaml digests key.
            case "$img" in
              backend|web|controller|postgres) key="$img" ;;
              claude-broker) key="claudeBroker" ;;
              repocache) key="repocache" ;;
            esac
            yq -i ".image.digests.${key} = \"${digest}\"" deploy/farm-talos/values.yaml
          done
          # runtime is built via build-images.sh (no metadata-file); resolve
          # its digest by inspecting the pushed manifest.
          if [ "${{ steps.runtime.outputs.rebuild }}" = "true" ]; then
            runtime_digest=$(crane digest \
              "${HARBOR_HOST}/multica/multica-runtime-claude:${{ steps.bump.outputs.tag }}")
            yq -i ".image.digests.runtimeClaude = \"${runtime_digest}\"" deploy/farm-talos/values.yaml
          fi
          yq -i ".image.tag = \"${{ steps.bump.outputs.tag }}\"" deploy/farm-talos/values.yaml

      - name: Commit the release
        run: |
          git config user.name "multica-release-bot[bot]"
          git config user.email "multica-release-bot[bot]@users.noreply.github.com"
          git add packaging/image-tag deploy/farm-talos/values.yaml
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git push origin HEAD:main

      - name: helm upgrade
        run: |
          helm upgrade --install multica packaging/helm/multica -n multica \
            -f deploy/farm-talos/values.yaml \
            --wait --timeout 5m

      - name: Watch rollouts
        run: |
          for d in multica-backend multica-web multica-controller multica-claude-broker multica-repocache; do
            kubectl -n multica rollout status deploy/$d --timeout=5m &
          done
          wait

      - name: Tag the release
        run: |
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}
