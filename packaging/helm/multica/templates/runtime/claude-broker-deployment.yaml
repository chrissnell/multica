{{- if and .Values.runtime.enabled (eq .Values.runtime.mode "controller") .Values.runtime.claudeBroker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-claude-broker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "claude-broker" "ctx" .) | nindent 4 }}
spec:
  # replicas: 1 + strategy: Recreate enforces a single-writer to the broker's
  # state Secret. Leader election in the broker itself is defence in depth
  # against accidental scale-up; the Recreate strategy guarantees there's
  # never two pods writing concurrently during a rolling update.
  replicas: {{ .Values.runtime.claudeBroker.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "multica.componentSelector" (dict "name" "claude-broker" "ctx" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "multica.componentLabels" (dict "name" "claude-broker" "ctx" .) | nindent 8 }}
    spec:
      serviceAccountName: multica-claude-broker
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: broker
          image: {{ include "multica.claudeBrokerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
            readOnlyRootFilesystem: true
          ports:
            - { name: admin,   containerPort: 8080 }
            # ops (:8081) is bound to 127.0.0.1 inside the container so it has
            # no containerPort here — there's no Service or NP rule for it.
            - { name: metrics, containerPort: 9090 }
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: BROKER_SECRET_NAME
              value: {{ .Values.runtime.claudeBroker.secretName | quote }}
            - name: BROKER_ACCESS_TOKEN_SECRET
              value: {{ .Values.runtime.claudeBroker.accessTokenSecret | quote }}
            - name: BROKER_REFRESH_PAD
              value: {{ .Values.runtime.claudeBroker.refreshPad | quote }}
            - name: BROKER_REFRESH_INTERVAL
              value: {{ .Values.runtime.claudeBroker.refreshInterval | quote }}
            - name: BROKER_LEASE_NAME
              value: {{ .Values.runtime.claudeBroker.leaseName | quote }}
            - name: BROKER_LOG_LEVEL
              value: {{ .Values.runtime.claudeBroker.logLevel | quote }}
            - name: BROKER_LOG_FORMAT
              value: {{ .Values.runtime.claudeBroker.logFormat | quote }}
          readinessProbe:
            httpGet: { path: /readyz, port: admin }
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 2
          # /healthz now returns 503 when the cached access_token is expired
          # beyond the broker's livenessStaleGrace (10m by default). At
          # periodSeconds=10 and failureThreshold=3, kubelet restarts the pod
          # after roughly 30s of sustained 503s — so the total time from
          # "broker stopped refreshing" to "kubelet restarts it" is
          # grace (10m) + ~30s. That's the post-2026-06-29 fix: pre-change,
          # /healthz unconditionally returned 200 and a wedged broker could
          # silently fail for hours.
          livenessProbe:
            httpGet: { path: /healthz, port: admin }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.runtime.claudeBroker.resources | nindent 12 }}
{{- end }}
