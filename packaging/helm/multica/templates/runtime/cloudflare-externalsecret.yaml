{{- if and .Values.runtime.enabled .Values.runtime.cloudflare.enabled .Values.runtime.cloudflare.externalSecret.enabled }}
{{- $cf := .Values.runtime.cloudflare }}
{{- $es := $cf.externalSecret }}
# Syncs the Cloudflare R2 credentials from Vault into the K8s Secret that
# worker/daemon pods consume via secretKeyRef. Requires External Secrets
# Operator and a (Cluster)SecretStore that can read the Vault path. The
# resulting Secret's keys mirror the Vault KV keys 1:1; runtime.cloudflare.env
# maps those keys onto pod env var names.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $cf.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "runtime" "ctx" .) | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $es.secretStoreRef.name | quote }}
    kind: {{ $es.secretStoreRef.kind | quote }}
  target:
    name: {{ $cf.secretName }}
    creationPolicy: Owner
  data:
  {{- range $cf.env }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ $es.remotePath | quote }}
        property: {{ .secretKey | quote }}
  {{- end }}
{{- end }}
