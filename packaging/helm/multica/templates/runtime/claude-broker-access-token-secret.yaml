{{- if and .Values.runtime.enabled (eq .Values.runtime.mode "controller") .Values.runtime.claudeBroker.enabled }}
# Pre-created so the broker only needs `update` (not `create`) on this Secret.
# RBAC `create` is silently ignored when scoped with resourceNames, so without
# this pre-bootstrap the broker can't lazily create the Secret on first Reload.
# The empty placeholder is overwritten the moment the broker starts.
#
# helm.sh/resource-policy=keep prevents `helm uninstall` from wiping the
# refreshed token (which would otherwise be lost across a chart reinstall).
# annotation hooks-keep + helm-managed → owned by helm but kept on uninstall.
#
# Idempotent: once the broker has written real data, helm leaves the Data
# field alone because we don't include `data` in the template body — helm
# only patches fields that appear in the manifest. (The Secret resource as
# a whole is owned by helm; the Data map is owned by the broker.)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.runtime.claudeBroker.accessTokenSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "claude-broker" "ctx" .) | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
{{- end }}
