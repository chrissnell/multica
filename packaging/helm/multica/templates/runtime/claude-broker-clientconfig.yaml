{{- if and .Values.runtime.enabled (eq .Values.runtime.mode "controller") .Values.runtime.claudeBroker.enabled }}
# Mounted into every worker Job pod (see controller's DispatchJob, Task 14).
# Provides the apiKeyHelper script that claude executes whenever it needs a
# bearer, and the settings.json that tells claude to use it. With this in
# place, worker pods don't need the OAuth refresh_token at all — the broker
# owns the refresh and serves access tokens on demand.
apiVersion: v1
kind: ConfigMap
metadata:
  name: multica-claude-broker-client
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "claude-broker" "ctx" .) | nindent 4 }}
data:
  # The helper script. claude runs this whenever it needs a bearer and uses
  # the trimmed stdout as the token. -sf so any error from the broker
  # surfaces as a non-zero exit (claude treats that as auth-failure).
  apiKeyHelper.sh: |
    #!/bin/sh
    exec curl -sf --max-time 5 http://multica-claude-broker.{{ .Release.Namespace }}.svc:8080/access_token
  # settings.json — accepted by `claude` on first run when mounted at
  # ~/.claude/settings.json. hasTrustDialogAccepted bypasses the workspace
  # trust gate that would otherwise block apiKeyHelper from being invoked.
  settings.json: |
    {
      "apiKeyHelper": "/etc/claude-broker/apiKeyHelper.sh",
      "hasTrustDialogAccepted": true
    }
{{- end }}
